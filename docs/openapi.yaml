      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country_id:
          type: integer

    SignupRequest:
      type: object
      required:
        - code
        - name
        - surname
        - email
        - username
        - password
        - country_id
        - state_id
      properties:
        code:
          type: integer
          example: 123456
        name:
          type: string
          example: Gustavo
        surname:
          type: string
          example: Calderón
        email:
          type: string
          format: email
          example: tavo@ercom.tech
        username:
          type: string
          example: tavo.tech
        password:
          type: string
          format: password
          example: pass1234
        country_id:
          type: integer
          example: 1
        state_id:
          type: integer
          example: 1

    LoginRequest:
      type: object
      required:
        - user
        - password
