openapi: 3.0.3
info:
  title: PortfolioPool API
  description: |
    API for managing portfolios, participants, sports, and tournaments.

    ## Sport identifiers
    | Sport       | `sport` param | sport_id |
    |-------------|---------------|----------|
    | NCAA Male   | `ncaa`        | 1 / 2    |
    | NCAA Female | `ncaa`        | 3        |
    | EPL         | `epl`         | 2        |
    | World Cup   | `world-cup`   | TBD      |

  version: 2.0.1
  contact:
    email: jonhgx@gmail.com

servers:
  - url: https://portfolio-pool-test.damnserver.com:443
    description: Test environment

x-tagGroups:
  - name: Auth
    tags: [auth]
  - name: NCAA Male
    tags:
      [ncaa-male-home, ncaa-male-portfolios, ncaa-male-stats, ncaa-male-history]
  - name: NCAA Female
    tags:
      [
        ncaa-female-home,
        ncaa-female-portfolios,
        ncaa-female-stats,
        ncaa-female-history,
      ]
  - name: EPL
    tags: [epl-home, epl-portfolios, epl-stats]
  - name: World Cup
    tags: [worldcup-home, worldcup-portfolios, worldcup-history]
  - name: Shared
    tags: [shared-tournaments, shared-reports]

tags:
  - name: auth
    x-displayName: Auth
    description: Authentication, registration, countries and user management.
  - name: ncaa-male-home
    x-displayName: Home
    description: Home screen — `sport=ncaa`, sport_id 1/2.
  - name: ncaa-male-portfolios
    x-displayName: Portfolios
    description: Portfolio CRUD for NCAA Men's Basketball.
  - name: ncaa-male-stats
    x-displayName: Stats
    description: Score and stats for NCAA Men's Basketball.
  - name: ncaa-male-history
    x-displayName: History
    description: Historical reports for NCAA Men's Basketball.
  - name: ncaa-female-home
    x-displayName: Home
    description: Home screen — `sport=ncaa`, sport_id 3.
  - name: ncaa-female-portfolios
    x-displayName: Portfolios
    description: Portfolio CRUD for NCAA Women's Basketball.
  - name: ncaa-female-stats
    x-displayName: Stats
    description: Score and stats for NCAA Women's Basketball.
  - name: ncaa-female-history
    x-displayName: History
    description: Historical reports for NCAA Women's Basketball.
  - name: epl-home
    x-displayName: Home
    description: Home screen — `sport=epl`, tournament_id 3.
  - name: epl-portfolios
    x-displayName: Portfolios
    description: Portfolio CRUD for the English Premier League.
  - name: epl-stats
    x-displayName: Stats
    description: Score and stats for the English Premier League.
  - name: worldcup-home
    x-displayName: Home
    description: Home screen — `sport=world-cup`.
  - name: worldcup-portfolios
    x-displayName: Portfolios
    description: Portfolio CRUD for FIFA World Cup.
  - name: worldcup-history
    x-displayName: History
    description: Historical reports for FIFA World Cup.
  - name: shared-tournaments
    x-displayName: Tournaments
    description: Generic tournament endpoints shared across all sports.
  - name: shared-reports
    x-displayName: Reports
    description: Generic report endpoints shared across multiple sports.

paths:
  /countries:
    get:
      tags: [auth]
      summary: Get all countries
      responses:
        "200":
          description: List of countries
          content:
            application/json:
              schema:
                type: object
                properties:
                  countries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Country"

  /countries/{countryId}/states:
    get:
      tags: [auth]
      summary: Get states by country
      parameters:
        - name: countryId
          in: path
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: List of states
          content:
            application/json:
              schema:
                type: object
                properties:
                  states:
                    type: array
                    items:
                      $ref: "#/components/schemas/State"

  /participants/signup:
    post:
      tags: [auth]
      summary: Sign up new participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Participant created
        "400":
          description: Invalid input

  /participants/login:
    post:
      tags: [auth]
      summary: Login participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  participant:
                    $ref: "#/components/schemas/Participant"
        "401":
          description: Invalid credentials

  /participants/forgot:
    post:
      tags: [auth]
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user: { type: string, example: gcalderon.7 }
      responses:
        "200":
          description: Reset email sent

  /sports:
    get:
      tags: [auth]
      summary: Get all sports
      responses:
        "200":
          description: List of sports
          content:
            application/json:
              schema:
                type: object
                properties:
                  sports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sport"

  /participants/{participantId}/sports:
    get:
      tags: [auth]
      summary: Get sports for a participant
      parameters:
        - name: participantId
          in: path
          required: true
          schema: { type: integer }
          example: 121
      responses:
        "200":
          description: Sports list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sport"

  /participants/{participantId}/wallet:
    get:
      tags: [auth]
      summary: Get participant wallet
      parameters:
        - name: participantId
          in: path
          required: true
          schema: { type: integer }
          example: 121
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    type: array
                    items:
                      $ref: "#/components/schemas/Wallet"

  /sports/{sportId}/tournaments:
    get:
      tags: [shared-tournaments]
      summary: Get tournaments by sport
      description: |
        - NCAA Male: `sportId=1`
        - NCAA Female: `sportId=3`
        - EPL: `sportId=2`
      parameters:
        - name: sportId
          in: path
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/stats:
    get:
      tags: [shared-tournaments]
      summary: Get tournament stats / participant count
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: Tournament statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      participants: { type: integer }

  /tournaments/{tournamentId}/parameters:
    get:
      tags: [shared-tournaments]
      summary: Get tournament parameter by key
      description: |
        Common keys: `POPONA`, `HOINFO`, `DATTOU`, `HOUTOU`, `TEAMXP` (EPL), `RECODE`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: key
          in: query
          required: true
          schema:
            type: string
            enum: [POPONA, HOINFO, DATTOU, HOUTOU, TEAMXP, RECODE]
          example: POPONA
      responses:
        "200":
          description: Parameter value
          content:
            application/json:
              schema:
                type: object
                properties:
                  value: { type: string }

  /tournaments/{tournamentId}/instructions:
    get:
      tags: [shared-tournaments]
      summary: Get tournament instructions
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: Instructions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  instructions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Instruction"

  /tournaments/{tournamentId}/payouts:
    get:
      tags: [shared-tournaments]
      summary: Get tournament payouts
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: portfolios
          in: query
          schema: { type: integer }
          example: 223
      responses:
        "200":
          description: Payout distribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  payouts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayOut"

  /tournaments/{tournamentId}/score/home:
    get:
      tags: [ncaa-male-home, ncaa-female-home, epl-home, worldcup-home]
      summary: Get home screen score
      description: |
        - **NCAA Male/Female:** `?participant_id={id}&sport=ncaa`
        - **EPL:** `?portfolio_id={id}&epl`
        - **World Cup:** `?participant_id={id}&sport=ncaa` *(TBD)*
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 4
        - name: participant_id
          in: query
          schema: { type: integer }
          example: 121
        - name: portfolio_id
          in: query
          description: EPL only
          schema: { type: integer }
          example: 566
        - name: sport
          in: query
          schema:
            type: string
            enum: [ncaa, epl, world-cup]
          example: ncaa
        - name: epl
          in: query
          description: Pass without value for EPL
          schema: { type: boolean }
      responses:
        "200":
          description: Home score data

  /participants/{participantId}/portfolios:
    get:
      tags:
        [
          ncaa-male-portfolios,
          ncaa-female-portfolios,
          epl-portfolios,
          worldcup-portfolios,
        ]
      summary: Get participant portfolios
      description: |
        - **NCAA:** `?tournament_id={id}&sport=ncaa`
        - **EPL:** `?tournament_id=3&epl`
        - **World Cup:** `?tournament_id={id}&sport=world-cup`
      parameters:
        - name: participantId
          in: path
          required: true
          schema: { type: integer }
          example: 121
        - name: tournament_id
          in: query
          schema: { type: integer }
          example: 2
        - name: sport
          in: query
          schema:
            type: string
            enum: [ncaa, world-cup]
          example: ncaa
        - name: epl
          in: query
          description: EPL only
          schema: { type: boolean }
        - name: portfolio_id
          in: query
          description: EPL only — filter by portfolio
          schema: { type: integer }
          example: 566
      responses:
        "200":
          description: List of portfolios
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolios:
                    type: array
                    items:
                      $ref: "#/components/schemas/Portfolio"

  /portfolios:
    post:
      tags:
        [
          ncaa-male-portfolios,
          ncaa-female-portfolios,
          epl-portfolios,
          worldcup-portfolios,
        ]
      summary: Create portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioCreateRequest"
      responses:
        "201":
          description: Portfolio created
        "400":
          description: Invalid input

  /portfolios/{portfolioId}:
    put:
      tags: [epl-portfolios]
      summary: Update portfolio — EPL only
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema: { type: integer }
          example: 570
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdateRequest"
      responses:
        "200":
          description: Portfolio updated
        "404":
          description: Not found
    delete:
      tags: [ncaa-male-portfolios, ncaa-female-portfolios, worldcup-portfolios]
      summary: Delete portfolio
      description: Not used by EPL (EPL uses PUT /remove).
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema: { type: integer }
          example: 565
      responses:
        "204":
          description: Portfolio deleted
        "404":
          description: Not found

  /tournaments/{tournamentId}/teams:
    get:
      tags: [ncaa-male-portfolios, ncaa-female-portfolios, worldcup-portfolios]
      summary: Get teams available for a tournament
      description: |
        - **NCAA:** `?sport=ncaa&show_all=false`
        - **World Cup:** `?sport=world-cup&show_all=false`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 3
        - name: sport
          in: query
          schema:
            type: string
            enum: [ncaa, world-cup]
          example: ncaa
        - name: show_all
          in: query
          schema: { type: boolean }
          example: false
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /sports/{sportId}/teams/not-available:
    get:
      tags:
        [
          ncaa-male-portfolios,
          ncaa-female-portfolios,
          epl-portfolios,
          worldcup-portfolios,
        ]
      summary: Get teams not available for selection
      parameters:
        - name: sportId
          in: path
          required: true
          schema: { type: integer }
          example: 3
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 5
      responses:
        "200":
          description: Unavailable teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/winner-of-team:
    get:
      tags: [ncaa-male-portfolios, ncaa-female-portfolios, worldcup-portfolios]
      summary: Get winner-of-team options
      description: |
        - **NCAA:** `?sport=ncaa&limit=99`
        - **World Cup:** `?sport=world-cup&limit=99`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: sport
          in: query
          schema: { type: string }
          example: ncaa
        - name: limit
          in: query
          schema: { type: integer }
          example: 99
      responses:
        "200":
          description: Winner-of-team data

  /tournaments/{tournamentId}/winner-of-team-has-team:
    get:
      tags: [ncaa-male-portfolios, ncaa-female-portfolios, worldcup-portfolios]
      summary: Get teams under a winner-of-team group
      description: |
        - **NCAA:** `?sport=ncaa&winner_of_team_id={id}`
        - **World Cup:** `?team_id={id}`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: sport
          in: query
          schema: { type: string }
          example: ncaa
        - name: winner_of_team_id
          in: query
          schema: { type: integer }
          example: 1
        - name: team_id
          in: query
          description: World Cup only
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Teams under the group

  /portfolios/{portfolioId}/per-week:
    get:
      tags: [epl-portfolios]
      summary: Get EPL portfolio by gameweek
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema: { type: integer }
          example: 566
        - name: week
          in: query
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Portfolio teams for the week
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /portfolios/{portfolioId}/remove:
    put:
      tags: [epl-portfolios]
      summary: Remove EPL portfolio from tournament (legacy)
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema: { type: integer }
          example: 266
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 3
      responses:
        "200":
          description: Portfolio removed

  /sports/{sportId}/teams/dynamics:
    get:
      tags: [epl-portfolios]
      summary: Get team dynamics — EPL only
      description: Dynamic team availability based on current standings.
      parameters:
        - name: sportId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 3
        - name: portfolio_id
          in: query
          required: true
          schema: { type: integer }
          example: 561
      responses:
        "200":
          description: Team dynamics data

  /sports/{sportId}/teams:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats, epl-portfolios]
      summary: Get teams by sport
      description: |
        - **NCAA:** `?sport=ncaa&tournament_id={id}` — Stats view.
        - **EPL:** `sportId=2`, no extra params — Portfolios view.
      parameters:
        - name: sportId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: sport
          in: query
          schema: { type: string }
          example: ncaa
        - name: tournament_id
          in: query
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/score/stats:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get team pick stats by round
      description: How many times each team was picked per round. NCAA only.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: sport
          in: query
          schema: { type: string }
          example: ncaa
        - name: round
          in: query
          schema: { type: integer }
          example: 1
        - name: order
          in: query
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Score statistics

  /tournaments/{tournamentId}/score/weeks:
    get:
      tags: [ncaa-male-stats, epl-stats]
      summary: Get available score weeks
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 3
      responses:
        "200":
          description: List of scored weeks
          content:
            application/json:
              schema:
                type: object
                properties:
                  weeks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Week"

  /tournaments/{tournamentId}/score/stats/portfolio:
    get:
      tags: [ncaa-male-stats, epl-stats]
      summary: Get portfolio stats by week
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 3
        - name: week
          in: query
          schema: { type: integer }
          example: 6
      responses:
        "200":
          description: Portfolio statistics per week

  /tournaments/{tournamentId}/score/points-per-round:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get points per round
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema: { type: integer }
          example: 2
        - name: sport
          in: query
          schema: { type: string }
          example: ncaa
      responses:
        "200":
          description: Points per round data

  /reports/most-picked-teams:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get most picked teams
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: Most picked teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MostPickedTeam"

  /reports/least-picked-teams:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get least picked teams
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: Least picked teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsNotPicked"

  /reports/teams-not-picked-log:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get teams not picked log
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: Teams not picked log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsNotPicked"

  /reports/teams-picked-log:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get teams picked log
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 2
      responses:
        "200":
          description: Teams picked log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsPickedLog"

  /reports/seed-pick-totals:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get seed pick totals
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Seed pick totals

  /reports/portfolio-seed-selections:
    get:
      tags: [ncaa-male-stats, ncaa-female-stats]
      summary: Get portfolio seed selections
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Portfolio seed selections

  /reports/teams-per-year-log:
    get:
      tags: [ncaa-male-history, ncaa-female-history, worldcup-history]
      summary: Get teams per year log
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 1
      responses:
        "200":
          description: Teams per year log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsPerYearLog"

  /reports/historical-perfect-portfolios-header:
    get:
      tags: [ncaa-male-history, ncaa-female-history, worldcup-history]
      summary: Get perfect portfolios header
      responses:
        "200":
          description: Perfect portfolios header
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamPerfectPortfolios"

  /reports/historical-perfect-portfolios-history:
    get:
      tags: [ncaa-male-history, ncaa-female-history]
      summary: Get perfect portfolios history by year
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
          example: 2024
      responses:
        "200":
          description: Perfect portfolios history

  /reports/historical-perfect-portfolios-weight:
    get:
      tags: [ncaa-male-history, ncaa-female-history]
      summary: Get perfect portfolios weight by year
      parameters:
        - name: year
          in: query
          required: true
          schema: { type: integer }
          example: 2024
      responses:
        "200":
          description: Perfect portfolios weight

  /reports/historical-all-rounds:
    get:
      tags: [ncaa-male-history, ncaa-female-history, worldcup-history]
      summary: Get historical all rounds
      parameters:
        - name: order-by
          in: query
          schema:
            type: string
            enum: [risk, points]
          example: risk
      responses:
        "200":
          description: Historical all rounds

  /reports/teams-picked-log-history:
    get:
      tags: [ncaa-male-history, ncaa-female-history]
      summary: Get teams picked log — historical by year
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema: { type: integer }
          example: 1
        - name: year
          in: query
          required: true
          schema: { type: integer }
          example: 2024
      responses:
        "200":
          description: Historical teams picked log

components:
  schemas:
    Country:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    State:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        country_id: { type: integer }

    SignupRequest:
      type: object
      required:
        [code, name, surname, email, username, password, country_id, state_id]
      properties:
        code: { type: integer, example: 123456 }
        name: { type: string, example: Gustavo }
        surname: { type: string, example: Calderón }
        email: { type: string, format: email, example: tavo@ercom.tech }
        username: { type: string, example: tavo.tech }
        password: { type: string, format: password, example: pass1234 }
        country_id: { type: integer, example: 1 }
        state_id: { type: integer, example: 1 }

    LoginRequest:
      type: object
      required: [user, password]
      properties:
        user: { type: string, example: gcalderon.7 }
        password:
          { type: string, format: password, example: tesxuc-futpAm-qitna3 }

    Participant:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        surname: { type: string }
        email: { type: string }
        username: { type: string }

    Sport:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        key: { type: string }
        description: { type: string }
        url: { type: string }
        url_disabled: { type: string }

    Tournament:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        key: { type: string }
        description: { type: string }
        crest_url: { type: string }
        current_round: { type: boolean }
        current: { type: boolean }

    Team:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        key: { type: string }
        seed: { type: integer }
        streak_multiplier: { type: integer }
        play_in_team: { type: boolean }
        selected: { type: boolean }
        crest_url: { type: string }

    PortfolioTeam:
      type: object
      required: [id, seed, streak_multiplier]
      properties:
        id: { type: integer, example: 145 }
        seed: { type: integer, example: 1 }
        streak_multiplier: { type: integer, example: 1 }

    Portfolio:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        tournament_id: { type: integer }
        participant_id: { type: integer }
        championship_points: { type: integer }
        available: { type: boolean }
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PortfolioCreateRequest:
      type: object
      required: [tournament_id, participant_id, championship_points, teams]
      properties:
        tournament_id: { type: integer, example: 2 }
        participant_id: { type: integer, example: 134 }
        championship_points: { type: integer, example: 0 }
        teams:
          type: array
          minItems: 5
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PortfolioUpdateRequest:
      type: object
      required: [teams]
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PayOut:
      type: object
      properties:
        place: { type: integer }
        percentage: { type: number, format: float }

    Instruction:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        highlighted: { type: boolean }

    Week:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        number: { type: integer }

    Wallet:
      type: object
      properties:
        id: { type: integer }
        balance: { type: number, format: float }
        currency: { type: string }

    MostPickedTeam:
      type: object
      properties:
        team_name: { type: string }
        times_picked: { type: integer }
        percentage_portfolios: { type: number, format: float }
        tournament_name: { type: string }
        year: { type: integer }

    TeamsNotPicked:
      type: object
      properties:
        team_name: { type: string }
        tournament_name: { type: string }
        year: { type: integer }

    TeamsPickedLog:
      type: object
      properties:
        team_name: { type: string }
        tournament_name: { type: string }
        year: { type: integer }
        times_picked: { type: integer }
        percentage_portfolios: { type: number, format: float }
        round_eliminated: { type: integer }

    TeamsPerYearLog:
      type: object
      properties:
        year: { type: integer }
        teams: { type: integer }
        tournament_id: { type: integer }

    TeamPerfectPortfolios:
      type: object
      properties:
        year: { type: integer }
        tournament_id: { type: integer }
        total_weight: { type: number, format: float }
        total_points: { type: number, format: float }
        tournament_name: { type: string }
