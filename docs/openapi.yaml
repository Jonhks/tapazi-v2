openapi: 3.0.3
info:
  title: PortfolioPool API
  description: API for managing portfolios, participants, sports, and tournaments
  version: 1.0.1
  contact:
    email: jonhgx@gmail.com

servers:
  - url: https://portfolio-pool-test.damnserver.com:443
    description: Test environment

tags:
  - name: Countries
    description: Country and state management
  - name: Participants
    description: Participant authentication and portfolio management
  - name: Portfolios
    description: Portfolio CRUD operations
  - name: Sports
    description: Sports, teams, and tournament information
  - name: Tournaments
    description: Tournament details, scoring, and statistics
  - name: Reports
    description: Reporting and analytics

paths:
  /:
    get:
      tags:
        - Test
      summary: Test endpoint
      description: Basic test endpoint to verify API is running
      responses:
        "200":
          description: Successful response

  # ─── Countries ───────────────────────────────────────────────

  /countries:
    get:
      tags:
        - Countries
      summary: Get all countries
      description: Retrieve list of all countries
      responses:
        "200":
          description: List of countries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"

  /countries/{countryId}/states:
    get:
      tags:
        - Countries
      summary: Get states by country
      description: Retrieve all states for a specific country
      parameters:
        - name: countryId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/State"

  # ─── Participants ────────────────────────────────────────────

  /participants/signup:
    post:
      tags:
        - Participants
      summary: Sign up new participant
      description: Register a new participant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Participant created successfully
        "400":
          description: Invalid input

  /participants/login:
    post:
      tags:
        - Participants
      summary: Login participant
      description: Authenticate a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials

  /participants/forgot:
    post:
      tags:
        - Participants
      summary: Forgot password
      description: Request password reset for a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
                  example: gcalderon.7
      responses:
        "200":
          description: Password reset request processed

  /participants/{participantId}/portfolios:
    get:
      tags:
        - Participants
      summary: Get participant portfolios
      description: Retrieve all portfolios for a participant
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
        - name: tournament_id
          in: query
          required: false
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
      responses:
        "200":
          description: List of portfolios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Portfolio"

  /participants/{participantId}/sports:
    get:
      tags:
        - Participants
      summary: Get participant sports
      description: Retrieve all sports associated with a participant
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
      responses:
        "200":
          description: List of sports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sport"

  # ─── Portfolios ─────────────────────────────────────────────

  /portfolios:
    post:
      tags:
        - Portfolios
      summary: Create portfolio
      description: Create a new portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioCreateRequest"
      responses:
        "201":
          description: Portfolio created successfully
        "400":
          description: Invalid input

  /portfolios/{portfolioId}:
    put:
      tags:
        - Portfolios
      summary: Update portfolio
      description: Update an existing portfolio
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 570
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdateRequest"
      responses:
        "200":
          description: Portfolio updated successfully
        "404":
          description: Portfolio not found

    delete:
      tags:
        - Portfolios
      summary: Delete portfolio
      description: Delete a portfolio
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 565
      responses:
        "204":
          description: Portfolio deleted successfully
        "404":
          description: Portfolio not found

  /portfolios/{portfolioId}/per-week:
    get:
      tags:
        - Portfolios
      summary: Get portfolio by week
      description: Retrieve portfolio information for a specific week
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 566
        - name: week
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Portfolio weekly data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Portfolio"

  /portfolios/{portfolioId}/remove:
    put:
      tags:
        - Portfolios
      summary: Remove portfolio from tournament
      description: Remove a portfolio from a specific tournament
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 266
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Portfolio removed successfully
        "404":
          description: Portfolio not found

  # ─── Sports ─────────────────────────────────────────────────

  /sports:
    get:
      tags:
        - Sports
      summary: Get all sports
      description: Retrieve list of all sports
      responses:
        "200":
          description: List of sports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sport"

  /sports/{sportId}/teams:
    get:
      tags:
        - Sports
      summary: Get teams by sport
      description: Retrieve all teams for a specific sport
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 1
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: tournament_id
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /sports/{sportId}/teams/not-available:
    get:
      tags:
        - Sports
      summary: Get unavailable teams
      description: Retrieve teams not available for a tournament
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 5
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
      responses:
        "200":
          description: List of unavailable teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /sports/{sportId}/teams/dynamics:
    get:
      tags:
        - Sports
      summary: Get team dynamics
      description: Retrieve team dynamics for a tournament and portfolio
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 3
        - name: portfolio_id
          in: query
          required: true
          schema:
            type: integer
          example: 561
      responses:
        "200":
          description: Team dynamics data

  /sports/{sportId}/tournaments:
    get:
      tags:
        - Sports
      summary: Get tournaments by sport
      description: Retrieve all tournaments for a specific sport
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"

  # ─── Tournaments ─────────────────────────────────────────────

  /tournaments/{tournamentId}:
    get:
      tags:
        - Tournaments
      summary: Get tournament
      description: Retrieve tournament details
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Tournament details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/instructions:
    get:
      tags:
        - Tournaments
      summary: Get tournament instructions
      description: Retrieve instructions for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Tournament instructions

  /tournaments/{tournamentId}/payouts:
    get:
      tags:
        - Tournaments
      summary: Get tournament payouts
      description: Retrieve payout information for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: portfolios
          in: query
          required: false
          schema:
            type: integer
          example: 99
      responses:
        "200":
          description: Payout information

  /tournaments/{tournamentId}/parameters:
    get:
      tags:
        - Tournaments
      summary: Get tournament parameters
      description: Retrieve tournament parameters by key
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 0
        - name: key
          in: query
          required: true
          schema:
            type: string
          example: RECODE
      responses:
        "200":
          description: Tournament parameters

  /tournaments/{tournamentId}/score/home:
    get:
      tags:
        - Tournaments
      summary: Get home score
      description: Retrieve home score for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 4
        - name: participant_id
          in: query
          required: false
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
      responses:
        "200":
          description: Home score data

  /tournaments/{tournamentId}/score/stats:
    get:
      tags:
        - Tournaments
      summary: Get score statistics
      description: Retrieve scoring statistics for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: round
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: order
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Score statistics data

  /tournaments/{tournamentId}/score/points-per-round:
    get:
      tags:
        - Tournaments
      summary: Get points per round
      description: Retrieve points breakdown per round for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
      responses:
        "200":
          description: Points per round data

  /tournaments/{tournamentId}/score/weeks:
    get:
      tags:
        - Tournaments
      summary: Get weekly scores
      description: Retrieve scores by week for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: Weekly scores

  /tournaments/{tournamentId}/score/stats/portfolio:
    get:
      tags:
        - Tournaments
      summary: Get portfolio statistics
      description: Retrieve portfolio statistics for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: week
          in: query
          required: false
          schema:
            type: integer
          example: 6
      responses:
        "200":
          description: Portfolio statistics

  /tournaments/{tournamentId}/stats:
    get:
      tags:
        - Tournaments
      summary: Get tournament statistics
      description: Retrieve general statistics for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Tournament statistics

  /tournaments/{tournamentId}/teams:
    get:
      tags:
        - Tournaments
      summary: Get tournament teams
      description: Retrieve teams participating in a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: show_all
          in: query
          required: false
          schema:
            type: boolean
          example: false
      responses:
        "200":
          description: List of tournament teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/winner-of-team:
    get:
      tags:
        - Tournaments
      summary: Get winner of team
      description: Retrieve winner-of-team data for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 10
      responses:
        "200":
          description: Winner of team data

  /tournaments/{tournamentId}/winner-of-team-has-team:
    get:
      tags:
        - Tournaments
      summary: Get winner-of-team has team
      description: Retrieve winner-of-team-has-team data for a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: winner_of_team_id
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Winner-of-team has team data

  # ─── Reports ─────────────────────────────────────────────────

  /reports/least-picked-teams:
    get:
      tags:
        - Reports
      summary: Get least picked teams
      description: Retrieve teams that have been picked the least
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: List of least picked teams

  /reports/most-picked-teams:
    get:
      tags:
        - Reports
      summary: Get most picked teams
      description: Retrieve teams that have been picked the most
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: List of most picked teams

  /reports/teams-picked-log:
    get:
      tags:
        - Reports
      summary: Get teams picked log
      description: Retrieve log of teams that have been picked
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Teams picked log data

  /reports/teams-picked-log-history:
    get:
      tags:
        - Reports
      summary: Get teams picked log history
      description: Retrieve historical log of teams picked by year
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2024
      responses:
        "200":
          description: Teams picked log history data

  /reports/teams-not-picked-log:
    get:
      tags:
        - Reports
      summary: Get teams not picked log
      description: Retrieve log of teams that have not been picked
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Teams not picked log data

  /reports/portfolio-seed-selections:
    get:
      tags:
        - Reports
      summary: Get portfolio seed selections
      description: Retrieve portfolio seed selection data
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Portfolio seed selections data

  /reports/seed-pick-totals:
    get:
      tags:
        - Reports
      summary: Get seed pick totals
      description: Retrieve total picks per seed
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Seed pick totals data

  /reports/historical-perfect-portfolios-header:
    get:
      tags:
        - Reports
      summary: Get historical perfect portfolios header
      description: Retrieve header data for historical perfect portfolios
      responses:
        "200":
          description: Historical perfect portfolios header data

  /reports/historical-perfect-portfolios-history:
    get:
      tags:
        - Reports
      summary: Get historical perfect portfolios history
      description: Retrieve historical perfect portfolios by year
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2024
      responses:
        "200":
          description: Historical perfect portfolios history data

  /reports/historical-perfect-portfolios-weight:
    get:
      tags:
        - Reports
      summary: Get historical perfect portfolios weight
      description: Retrieve historical perfect portfolios weight by year
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2024
      responses:
        "200":
          description: Historical perfect portfolios weight data

  /reports/teams-per-year-log:
    get:
      tags:
        - Reports
      summary: Get teams per year log
      description: Retrieve log of teams per year
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Teams per year log data

  /reports/historical-all-rounds:
    get:
      tags:
        - Reports
      summary: Get historical all rounds
      description: Retrieve historical data for all rounds
      parameters:
        - name: order-by
          in: query
          required: false
          schema:
            type: string
          example: risk
      responses:
        "200":
          description: Historical all rounds data

components:
  schemas:
    Country:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    State:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country_id:
          type: integer

    SignupRequest:
      type: object
      required:
        - code
        - name
        - surname
        - email
        - username
        - password
        - country_id
        - state_id
      properties:
        code:
          type: integer
          example: 123456
        name:
          type: string
          example: Gustavo
        surname:
          type: string
          example: Calderón
        email:
          type: string
          format: email
          example: tavo@ercom.tech
        username:
          type: string
          example: tavo.tech
        password:
          type: string
          format: password
          example: pass1234
        country_id:
          type: integer
          example: 1
        state_id:
          type: integer
          example: 1

    LoginRequest:
      type: object
      required:
        - user
        - password
      properties:
        user:
          type: string
          example: gcalderon.7
        password:
          type: string
          format: password
          example: tesxuc-futpAm-qitna3

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        seed:
          type: integer
        streak_multiplier:
          type: integer

    PortfolioTeam:
      type: object
      required:
        - id
        - seed
        - streak_multiplier
      properties:
        id:
          type: integer
          example: 145
        seed:
          type: integer
          example: 1
        streak_multiplier:
          type: integer
          example: 1

    Portfolio:
      type: object
      properties:
        id:
          type: integer
        tournament_id:
          type: integer
        participant_id:
          type: integer
        championship_points:
          type: integer
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PortfolioCreateRequest:
      type: object
      required:
        - tournament_id
        - participant_id
        - championship_points
        - teams
      properties:
        tournament_id:
          type: integer
          example: 2
        participant_id:
          type: integer
          example: 134
        championship_points:
          type: integer
          example: 0
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"
          minItems: 5

    PortfolioUpdateRequest:
      type: object
      required:
        - teams
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    Sport:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    Tournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sport_id:
          type: integer
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
