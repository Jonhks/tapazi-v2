openapi: 3.0.3
info:
  title: PortfolioPool API
  description: |
    API for managing portfolios, participants, sports, and tournaments.

    ## Sports & IDs
    | Sport       | sport param | sport_id |
    |-------------|-------------|----------|
    | NCAA Male   | `ncaa`      | 1 / 2    |
    | NCAA Female | `ncaa`      | 3        |
    | EPL         | `epl`       | 2        |
    | World Cup   | `world-cup` | TBD      |

  version: 1.0.1
  contact:
    email: jonhgx@gmail.com

servers:
  - url: https://portfolio-pool-test.damnserver.com:443
    description: Test environment

tags:
  - name: Auth
    description: Authentication, registration, countries and user management. No sport required.
  - name: NCAA Male
    description: NCAA Men's Basketball — `sport=ncaa`, sport_id 1/2
  - name: NCAA Female
    description: NCAA Women's Basketball — `sport=ncaa`, sport_id 3
  - name: EPL
    description: English Premier League — `sport=epl`, tournament_id fixed to 3
  - name: World Cup
    description: FIFA World Cup — `sport=world-cup`
  - name: Shared
    description: Endpoints shared across multiple sports (reports, tournaments, parameters)

paths:

  # ─── Auth ────────────────────────────────────────────────────

  /countries:
    get:
      tags:
        - Auth
      summary: Get all countries
      description: Retrieve list of all countries
      responses:
        "200":
          description: List of countries
          content:
            application/json:
              schema:
                type: object
                properties:
                  countries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Country"

  /countries/{countryId}/states:
    get:
      tags:
        - Auth
      summary: Get states by country
      description: Retrieve all states for a specific country
      parameters:
        - name: countryId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of states
          content:
            application/json:
              schema:
                type: object
                properties:
                  states:
                    type: array
                    items:
                      $ref: "#/components/schemas/State"

  /participants/signup:
    post:
      tags:
        - Auth
      summary: Sign up new participant
      description: Register a new participant account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Participant created successfully
        "400":
          description: Invalid input

  /participants/login:
    post:
      tags:
        - Auth
      summary: Login participant
      description: Authenticate a participant and retrieve their data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  participant:
                    $ref: "#/components/schemas/Participant"
        "401":
          description: Invalid credentials

  /participants/forgot:
    post:
      tags:
        - Auth
      summary: Forgot password
      description: Request a password reset for a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  type: string
                  example: gcalderon.7
      responses:
        "200":
          description: Password reset request processed

  /sports:
    get:
      tags:
        - Auth
      summary: Get all sports
      description: Retrieve list of all available sports
      responses:
        "200":
          description: List of sports
          content:
            application/json:
              schema:
                type: object
                properties:
                  sports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sport"

  /participants/{participantId}/sports:
    get:
      tags:
        - Auth
      summary: Get sports for a participant
      description: Retrieve all sports associated with a specific participant
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
      responses:
        "200":
          description: List of sports for the participant
          content:
            application/json:
              schema:
                type: object
                properties:
                  sports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sport"

  /participants/{participantId}/wallet:
    get:
      tags:
        - Auth
      summary: Get participant wallet
      description: Retrieve wallet balance and details for a participant
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    type: array
                    items:
                      $ref: "#/components/schemas/Wallet"

  # ─── Shared ───────────────────────────────────────────────────

  /sports/{sportId}/tournaments:
    get:
      tags:
        - Shared
      summary: Get tournaments by sport
      description: |
        Retrieve all tournaments for a specific sport. Used by all sport modules.
        - NCAA Male: sportId = 1
        - NCAA Female: sportId = 3
        - EPL: sportId = 2
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/stats:
    get:
      tags:
        - Shared
      summary: Get tournament statistics / participant count
      description: Retrieve general statistics for a tournament, including participant count.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Tournament statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      participants:
                        type: integer

  /tournaments/{tournamentId}/parameters:
    get:
      tags:
        - Shared
      summary: Get tournament parameter by key
      description: |
        Retrieve a tournament parameter value by key. Common keys:
        - `POPONA` — number of portfolios per participant
        - `HOINFO` — home info parameter
        - `DATTOU` — tournament date info
        - `HOUTOU` — tournament hours info
        - `TEAMXP` — team XP value (EPL)
        - `RECODE` — recode parameter
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: key
          in: query
          required: true
          schema:
            type: string
            enum: [POPONA, HOINFO, DATTOU, HOUTOU, TEAMXP, RECODE]
          example: POPONA
      responses:
        "200":
          description: Parameter value
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: string

  /tournaments/{tournamentId}/instructions:
    get:
      tags:
        - Shared
      summary: Get tournament instructions
      description: Retrieve instructions for a tournament. Used by all sport modules.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Tournament instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  instructions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Instruction"

  /tournaments/{tournamentId}/payouts:
    get:
      tags:
        - Shared
      summary: Get tournament payouts
      description: Retrieve payout distribution for a tournament. Used by all sport modules.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: portfolios
          in: query
          required: false
          schema:
            type: integer
          example: 223
      responses:
        "200":
          description: Payout information
          content:
            application/json:
              schema:
                type: object
                properties:
                  payouts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayOut"

  /tournaments/{tournamentId}/score/home:
    get:
      tags:
        - Shared
      summary: Get home screen score
      description: |
        Retrieve score data for the home screen. Query params differ by sport:
        - NCAA Male / Female: `?participant_id={id}&sport=ncaa`
        - EPL: `?portfolio_id={id}&epl`
        - World Cup: `?participant_id={id}&sport=ncaa` (TBD)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 4
        - name: participant_id
          in: query
          required: false
          schema:
            type: integer
          example: 121
        - name: portfolio_id
          in: query
          required: false
          schema:
            type: integer
          example: 566
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: epl
          in: query
          required: false
          description: Pass without value for EPL requests
          schema:
            type: boolean
      responses:
        "200":
          description: Home score data

  # ─── NCAA Male ────────────────────────────────────────────────

  /sports/{sportId}/teams:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - EPL
      summary: Get teams by sport
      description: |
        Retrieve all teams for a sport.
        - NCAA Male: sportId=2, `?sport=ncaa&tournament_id={id}`
        - NCAA Female: sportId=2, `?sport=ncaa&tournament_id={id}`
        - EPL: sportId=2 (no extra params)
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: tournament_id
          in: query
          required: false
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /sports/{sportId}/teams/not-available:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - EPL
        - World Cup
      summary: Get unavailable teams
      description: Retrieve teams not available for selection in a tournament.
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 5
      responses:
        "200":
          description: List of unavailable teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/teams:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - World Cup
      summary: Get teams for a tournament
      description: |
        Retrieve teams participating in a tournament.
        - NCAA: `?sport=ncaa&show_all=false`
        - World Cup: `?sport=world-cup&show_all=false`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: show_all
          in: query
          required: false
          schema:
            type: boolean
          example: false
      responses:
        "200":
          description: List of tournament teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/winner-of-team:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - World Cup
      summary: Get winner-of-team options
      description: |
        Retrieve winner-of-team bracket data.
        - NCAA: `?sport=ncaa&limit=99`
        - World Cup: `?sport=world-cup&limit=99`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 99
      responses:
        "200":
          description: Winner of team data

  /tournaments/{tournamentId}/winner-of-team-has-team:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - World Cup
      summary: Get teams under a winner-of-team group
      description: |
        Retrieve the teams under a specific winner-of-team group.
        - NCAA: `?sport=ncaa&winner_of_team_id={id}`
        - World Cup: `?team_id={id}`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: winner_of_team_id
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: team_id
          in: query
          required: false
          description: Used in World Cup instead of winner_of_team_id
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Teams under winner-of-team group

  /participants/{participantId}/portfolios:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - EPL
        - World Cup
      summary: Get participant portfolios
      description: |
        Retrieve all portfolios for a participant in a tournament.
        - NCAA Male/Female: `?tournament_id={id}&sport=ncaa`
        - EPL: `?tournament_id=3&epl` or `?tournament_id=3&portfolio_id={id}&epl`
        - World Cup: `?tournament_id={id}&sport=world-cup`
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
        - name: tournament_id
          in: query
          required: false
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: epl
          in: query
          required: false
          description: Pass without value for EPL requests
          schema:
            type: boolean
        - name: portfolio_id
          in: query
          required: false
          description: EPL only — filter by specific portfolio
          schema:
            type: integer
          example: 566
      responses:
        "200":
          description: List of portfolios
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolios:
                    type: array
                    items:
                      $ref: "#/components/schemas/Portfolio"

  /portfolios:
    post:
      tags:
        - NCAA Male
        - NCAA Female
        - EPL
        - World Cup
      summary: Create portfolio
      description: |
        Create a new portfolio for a participant.
        - NCAA / World Cup: `{ tournament_id, participant_id, championship_points, teams }`
        - EPL: same structure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioCreateRequest"
      responses:
        "201":
          description: Portfolio created successfully
        "400":
          description: Invalid input

  /portfolios/{portfolioId}:
    put:
      tags:
        - EPL
      summary: Update portfolio (EPL only)
      description: Update an existing EPL portfolio's teams.
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 570
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdateRequest"
      responses:
        "200":
          description: Portfolio updated successfully
        "404":
          description: Portfolio not found

    delete:
      tags:
        - NCAA Male
        - NCAA Female
        - World Cup
      summary: Delete portfolio
      description: Delete a portfolio. Used by NCAA Male, NCAA Female and World Cup.
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 565
      responses:
        "204":
          description: Portfolio deleted successfully
        "404":
          description: Portfolio not found

  /portfolios/{portfolioId}/per-week:
    get:
      tags:
        - EPL
      summary: Get EPL portfolio by week
      description: Retrieve the teams in an EPL portfolio for a specific week.
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 566
        - name: week
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Portfolio teams for the week
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /portfolios/{portfolioId}/remove:
    put:
      tags:
        - EPL
      summary: Remove EPL portfolio from tournament (legacy)
      description: Legacy endpoint — remove an EPL portfolio from a tournament.
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 266
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: Portfolio removed successfully

  /sports/{sportId}/teams/dynamics:
    get:
      tags:
        - EPL
      summary: Get team dynamics (EPL only)
      description: Retrieve dynamic team data for an EPL portfolio, including current standing.
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 3
        - name: portfolio_id
          in: query
          required: true
          schema:
            type: integer
          example: 561
      responses:
        "200":
          description: Team dynamics data

  /tournaments/{tournamentId}/score/stats:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get score stats by round
      description: Retrieve team pick statistics per round. NCAA only.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: round
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: order
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Score statistics data

  /tournaments/{tournamentId}/score/weeks:
    get:
      tags:
        - NCAA Male
        - EPL
      summary: Get available score weeks
      description: Retrieve the list of weeks that have score data. Used by NCAA Male and EPL.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: List of weeks
          content:
            application/json:
              schema:
                type: object
                properties:
                  weeks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Week"

  /tournaments/{tournamentId}/score/stats/portfolio:
    get:
      tags:
        - NCAA Male
        - EPL
      summary: Get portfolio stats by week
      description: Retrieve portfolio performance statistics for a specific week.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: week
          in: query
          required: false
          schema:
            type: integer
          example: 6
      responses:
        "200":
          description: Portfolio statistics per week

  /tournaments/{tournamentId}/score/points-per-round:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get points per round
      description: Retrieve points breakdown by round for a tournament.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
      responses:
        "200":
          description: Points per round data

  # ─── Reports ─────────────────────────────────────────────────

  /reports/most-picked-teams:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get most picked teams
      description: Retrieve teams picked most frequently across portfolios.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Most picked teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MostPickedTeam"

  /reports/least-picked-teams:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get least picked teams
      description: Retrieve teams picked least frequently across portfolios.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Least picked teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsNotPicked"

  /reports/teams-not-picked-log:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get teams not picked log
      description: Retrieve log of teams that were not picked in a tournament.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Teams not picked log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsNotPicked"

  /reports/teams-picked-log:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get teams picked log
      description: Retrieve log of teams that were picked in a tournament.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Teams picked log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsPickedLog"

  /reports/teams-picked-log-history:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get teams picked log — historical
      description: Retrieve historical log of teams picked, filtered by year.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
        - name: year
          in: query
          required: true
          schema:
            type: integer
          example: 2024
      responses:
        "200":
          description: Historical teams picked log

  /reports/seed-pick-totals:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get seed pick totals
      description: Retrieve total picks per seed number.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Seed pick totals

  /reports/portfolio-seed-selections:
    get:
      tags:
        - NCAA Male
        - NCAA Female
      summary: Get portfolio seed selections
      description: Retrieve how many portfolios picked each seed.
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Portfolio seed selections

  /reports/historical-perfect-portfolios-header:
    get:
      tags:
        - NCAA Male
        - NCAA Female
        - World Cup
      summary: Get perfect portfolios header (history)
      description: Retrieve header data for historical perfect portfolios.
      responses:
        "200":
          description: Perfect portfolios header
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamPerfectPortfolios"

  /reports/historical-perfect-portfolios-history:
    get:
