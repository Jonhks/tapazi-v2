openapi: 3.0.3
info:
  title: PortfolioPool API
  description: |
    API for managing portfolios, participants, sports, and tournaments.

    ## Sport identifiers
    | Sport       | `sport` param | sport_id |
    |-------------|---------------|----------|
    | NCAA Male   | `ncaa`        | 1 / 2    |
    | NCAA Female | `ncaa`        | 3        |
    | EPL         | `epl`         | 2        |
    | World Cup   | `world-cup`   | TBD      |

  version: 1.0.1
  contact:
    email: jonhgx@gmail.com

servers:
  - url: https://portfolio-pool-test.damnserver.com:443
    description: Test environment

# ─── Tag groups (Redoc sidebar) ──────────────────────────────
x-tagGroups:
  - name: Auth
    tags:
      - Auth
  - name: NCAA Male
    tags:
      - NCAA Male — Home
      - NCAA Male — Portfolios
      - NCAA Male — Stats
      - NCAA Male — History
  - name: NCAA Female
    tags:
      - NCAA Female — Home
      - NCAA Female — Portfolios
      - NCAA Female — Stats
      - NCAA Female — History
  - name: EPL
    tags:
      - EPL — Home
      - EPL — Portfolios
      - EPL — Stats
  - name: World Cup
    tags:
      - World Cup — Home
      - World Cup — Portfolios
      - World Cup — History
  - name: Shared
    tags:
      - Shared — Tournaments
      - Shared — Reports

tags:
  - name: Auth
    description: Authentication, registration, countries and user management.
  - name: NCAA Male — Home
    description: Home screen endpoints for NCAA Men's Basketball (`sport=ncaa`, sport_id 1/2).
  - name: NCAA Male — Portfolios
    description: Portfolio management for NCAA Men's Basketball.
  - name: NCAA Male — Stats
    description: Stats and score endpoints for NCAA Men's Basketball.
  - name: NCAA Male — History
    description: Historical reports for NCAA Men's Basketball.
  - name: NCAA Female — Home
    description: Home screen endpoints for NCAA Women's Basketball (`sport=ncaa`, sport_id 3).
  - name: NCAA Female — Portfolios
    description: Portfolio management for NCAA Women's Basketball.
  - name: NCAA Female — Stats
    description: Stats and score endpoints for NCAA Women's Basketball.
  - name: NCAA Female — History
    description: Historical reports for NCAA Women's Basketball.
  - name: EPL — Home
    description: Home screen endpoints for the English Premier League (`sport=epl`, tournament_id 3).
  - name: EPL — Portfolios
    description: Portfolio management for the English Premier League.
  - name: EPL — Stats
    description: Stats and score endpoints for the English Premier League.
  - name: World Cup — Home
    description: Home screen endpoints for FIFA World Cup (`sport=world-cup`).
  - name: World Cup — Portfolios
    description: Portfolio management for FIFA World Cup.
  - name: World Cup — History
    description: Historical reports for FIFA World Cup.
  - name: Shared — Tournaments
    description: Generic tournament endpoints used across all sports (tournaments, parameters, payouts, instructions).
  - name: Shared — Reports
    description: Generic report endpoints shared across multiple sports.

paths:

  # ────────────────────────────────────────────────────────────
  # Auth
  # ────────────────────────────────────────────────────────────

  /countries:
    get:
      tags: [Auth]
      summary: Get all countries
      responses:
        "200":
          description: List of countries
          content:
            application/json:
              schema:
                type: object
                properties:
                  countries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Country"

  /countries/{countryId}/states:
    get:
      tags: [Auth]
      summary: Get states by country
      parameters:
        - name: countryId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of states
          content:
            application/json:
              schema:
                type: object
                properties:
                  states:
                    type: array
                    items:
                      $ref: "#/components/schemas/State"

  /participants/signup:
    post:
      tags: [Auth]
      summary: Sign up new participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: Participant created successfully
        "400":
          description: Invalid input

  /participants/login:
    post:
      tags: [Auth]
      summary: Login participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  participant:
                    $ref: "#/components/schemas/Participant"
        "401":
          description: Invalid credentials

  /participants/forgot:
    post:
      tags: [Auth]
      summary: Forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  type: string
                  example: gcalderon.7
      responses:
        "200":
          description: Password reset request processed

  /sports:
    get:
      tags: [Auth]
      summary: Get all sports
      responses:
        "200":
          description: List of sports
          content:
            application/json:
              schema:
                type: object
                properties:
                  sports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sport"

  /participants/{participantId}/sports:
    get:
      tags: [Auth]
      summary: Get sports for a participant
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
      responses:
        "200":
          description: List of sports for the participant
          content:
            application/json:
              schema:
                type: object
                properties:
                  sports:
                    type: array
                    items:
                      $ref: "#/components/schemas/Sport"

  /participants/{participantId}/wallet:
    get:
      tags: [Auth]
      summary: Get participant wallet
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    type: array
                    items:
                      $ref: "#/components/schemas/Wallet"

  # ────────────────────────────────────────────────────────────
  # Shared — Tournaments
  # ────────────────────────────────────────────────────────────

  /sports/{sportId}/tournaments:
    get:
      tags: [Shared — Tournaments]
      summary: Get tournaments by sport
      description: |
        Used by all modules to load the tournament selector.
        - NCAA Male: `sportId=1`
        - NCAA Female: `sportId=3`
        - EPL: `sportId=2`
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: List of tournaments
          content:
            application/json:
              schema:
                type: object
                properties:
                  tournaments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/stats:
    get:
      tags: [Shared — Tournaments]
      summary: Get tournament stats / participant count
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Tournament statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      participants:
                        type: integer

  /tournaments/{tournamentId}/parameters:
    get:
      tags: [Shared — Tournaments]
      summary: Get tournament parameter by key
      description: |
        Common keys:
        - `POPONA` — max portfolios per participant
        - `HOINFO` — home info text
        - `DATTOU` — tournament date info
        - `HOUTOU` — tournament hours info
        - `TEAMXP` — team XP value (EPL)
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: key
          in: query
          required: true
          schema:
            type: string
            enum: [POPONA, HOINFO, DATTOU, HOUTOU, TEAMXP, RECODE]
          example: POPONA
      responses:
        "200":
          description: Parameter value
          content:
            application/json:
              schema:
                type: object
                properties:
                  value:
                    type: string

  /tournaments/{tournamentId}/instructions:
    get:
      tags: [Shared — Tournaments]
      summary: Get tournament instructions
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Tournament instructions
          content:
            application/json:
              schema:
                type: object
                properties:
                  instructions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Instruction"

  /tournaments/{tournamentId}/payouts:
    get:
      tags: [Shared — Tournaments]
      summary: Get tournament payouts
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: portfolios
          in: query
          required: false
          schema:
            type: integer
          example: 223
      responses:
        "200":
          description: Payout distribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  payouts:
                    type: array
                    items:
                      $ref: "#/components/schemas/PayOut"

  /tournaments/{tournamentId}/score/home:
    get:
      tags:
        - NCAA Male — Home
        - NCAA Female — Home
        - EPL — Home
        - World Cup — Home
      summary: Get home screen score
      description: |
        Returns current score data for the home screen. Query params differ by sport:
        - **NCAA Male / Female:** `?participant_id={id}&sport=ncaa`
        - **EPL:** `?portfolio_id={id}&epl`
        - **World Cup:** `?participant_id={id}&sport=ncaa` *(TBD)*
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 4
        - name: participant_id
          in: query
          required: false
          schema:
            type: integer
          example: 121
        - name: portfolio_id
          in: query
          required: false
          description: EPL only
          schema:
            type: integer
          example: 566
        - name: sport
          in: query
          required: false
          schema:
            type: string
            enum: [ncaa, epl, world-cup]
          example: ncaa
        - name: epl
          in: query
          required: false
          description: Pass without value for EPL requests
          schema:
            type: boolean
      responses:
        "200":
          description: Home score data

  # ────────────────────────────────────────────────────────────
  # Portfolios — shared across sports
  # ────────────────────────────────────────────────────────────

  /participants/{participantId}/portfolios:
    get:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - EPL — Portfolios
        - World Cup — Portfolios
      summary: Get participant portfolios
      description: |
        - **NCAA Male/Female:** `?tournament_id={id}&sport=ncaa`
        - **EPL:** `?tournament_id=3&epl` or `?tournament_id=3&portfolio_id={id}&epl`
        - **World Cup:** `?tournament_id={id}&sport=world-cup`
      parameters:
        - name: participantId
          in: path
          required: true
          schema:
            type: integer
          example: 121
        - name: tournament_id
          in: query
          required: false
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
            enum: [ncaa, world-cup]
          example: ncaa
        - name: epl
          in: query
          required: false
          description: EPL only — pass without value
          schema:
            type: boolean
        - name: portfolio_id
          in: query
          required: false
          description: EPL only — filter by portfolio
          schema:
            type: integer
          example: 566
      responses:
        "200":
          description: List of portfolios
          content:
            application/json:
              schema:
                type: object
                properties:
                  portfolios:
                    type: array
                    items:
                      $ref: "#/components/schemas/Portfolio"

  /portfolios:
    post:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - EPL — Portfolios
        - World Cup — Portfolios
      summary: Create portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioCreateRequest"
      responses:
        "201":
          description: Portfolio created successfully
        "400":
          description: Invalid input

  /portfolios/{portfolioId}:
    put:
      tags:
        - EPL — Portfolios
      summary: Update portfolio — EPL only
      description: Update teams in an existing EPL portfolio.
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 570
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioUpdateRequest"
      responses:
        "200":
          description: Portfolio updated successfully
        "404":
          description: Portfolio not found

    delete:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - World Cup — Portfolios
      summary: Delete portfolio
      description: Delete a portfolio. Not used by EPL (uses PUT /remove instead).
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 565
      responses:
        "204":
          description: Portfolio deleted successfully
        "404":
          description: Portfolio not found

  /tournaments/{tournamentId}/teams:
    get:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - World Cup — Portfolios
      summary: Get teams available for a tournament
      description: |
        - **NCAA:** `?sport=ncaa&show_all=false`
        - **World Cup:** `?sport=world-cup&show_all=false`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: sport
          in: query
          required: false
          schema:
            type: string
            enum: [ncaa, world-cup]
          example: ncaa
        - name: show_all
          in: query
          required: false
          schema:
            type: boolean
          example: false
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /sports/{sportId}/teams/not-available:
    get:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - EPL — Portfolios
        - World Cup — Portfolios
      summary: Get teams not available for selection
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 5
      responses:
        "200":
          description: List of unavailable teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /tournaments/{tournamentId}/winner-of-team:
    get:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - World Cup — Portfolios
      summary: Get winner-of-team options
      description: |
        - **NCAA:** `?sport=ncaa&limit=99`
        - **World Cup:** `?sport=world-cup&limit=99`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 99
      responses:
        "200":
          description: Winner-of-team data

  /tournaments/{tournamentId}/winner-of-team-has-team:
    get:
      tags:
        - NCAA Male — Portfolios
        - NCAA Female — Portfolios
        - World Cup — Portfolios
      summary: Get teams under a winner-of-team group
      description: |
        - **NCAA:** `?sport=ncaa&winner_of_team_id={id}`
        - **World Cup:** `?team_id={id}`
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: winner_of_team_id
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: team_id
          in: query
          required: false
          description: World Cup — replaces winner_of_team_id
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Teams under the winner-of-team group

  # ────────────────────────────────────────────────────────────
  # EPL — Portfolios (EPL-specific)
  # ────────────────────────────────────────────────────────────

  /portfolios/{portfolioId}/per-week:
    get:
      tags:
        - EPL — Portfolios
      summary: Get EPL portfolio by week
      description: Retrieve the teams selected in an EPL portfolio for a specific gameweek.
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 566
        - name: week
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Portfolio teams for the week
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  /portfolios/{portfolioId}/remove:
    put:
      tags:
        - EPL — Portfolios
      summary: Remove EPL portfolio from tournament (legacy)
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
          example: 266
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: Portfolio removed successfully

  /sports/{sportId}/teams/dynamics:
    get:
      tags:
        - EPL — Portfolios
      summary: Get team dynamics — EPL only
      description: Retrieve dynamic team availability for an EPL portfolio based on current standings.
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 3
        - name: portfolio_id
          in: query
          required: true
          schema:
            type: integer
          example: 561
      responses:
        "200":
          description: Team dynamics data

  /sports/{sportId}/teams:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
        - EPL — Portfolios
      summary: Get teams by sport
      description: |
        - **NCAA Male/Female:** `?sport=ncaa&tournament_id={id}` — used in Stats view.
        - **EPL:** `sportId=2`, no extra params — used in Portfolios to load available teams.
      parameters:
        - name: sportId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: tournament_id
          in: query
          required: false
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Team"

  # ────────────────────────────────────────────────────────────
  # Stats
  # ────────────────────────────────────────────────────────────

  /tournaments/{tournamentId}/score/stats:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get team pick stats by round
      description: Returns how many times each team was picked per round. NCAA only.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
        - name: round
          in: query
          required: false
          schema:
            type: integer
          example: 1
        - name: order
          in: query
          required: false
          schema:
            type: integer
          example: 1
      responses:
        "200":
          description: Score statistics

  /tournaments/{tournamentId}/score/weeks:
    get:
      tags:
        - NCAA Male — Stats
        - EPL — Stats
      summary: Get available score weeks
      description: Returns the list of weeks with score data. Used by NCAA Male and EPL.
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
      responses:
        "200":
          description: List of scored weeks
          content:
            application/json:
              schema:
                type: object
                properties:
                  weeks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Week"

  /tournaments/{tournamentId}/score/stats/portfolio:
    get:
      tags:
        - NCAA Male — Stats
        - EPL — Stats
      summary: Get portfolio stats by week
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 3
        - name: week
          in: query
          required: false
          schema:
            type: integer
          example: 6
      responses:
        "200":
          description: Portfolio statistics per week

  /tournaments/{tournamentId}/score/points-per-round:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get points per round
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: integer
          example: 2
        - name: sport
          in: query
          required: false
          schema:
            type: string
          example: ncaa
      responses:
        "200":
          description: Points per round data

  /reports/most-picked-teams:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get most picked teams
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Most picked teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MostPickedTeam"

  /reports/least-picked-teams:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get least picked teams
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Least picked teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsNotPicked"

  /reports/teams-not-picked-log:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get teams not picked log
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Teams not picked log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsNotPicked"

  /reports/teams-picked-log:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get teams picked log
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        "200":
          description: Teams picked log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamsPickedLog"

  /reports/seed-pick-totals:
    get:
      tags:
        - NCAA Male — Stats
        - NCAA Female — Stats
      summary: Get seed pick totals
      parameters:
        - name: tournament_id
          in: query
          required: true
          schema:
            type: integer
          example: 1
      responses:
        "200":
