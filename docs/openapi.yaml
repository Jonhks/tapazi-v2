# ────────────────────────────────────────────────────────────
# Schemas
# ────────────────────────────────────────────────────────────

components:
  schemas:

    Country:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    State:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        country_id:
          type: integer

    SignupRequest:
      type: object
      required: [code, name, surname, email, username, password, country_id, state_id]
      properties:
        code:
          type: integer
          example: 123456
        name:
          type: string
          example: Gustavo
        surname:
          type: string
          example: Calderón
        email:
          type: string
          format: email
          example: tavo@ercom.tech
        username:
          type: string
          example: tavo.tech
        password:
          type: string
          format: password
          example: pass1234
        country_id:
          type: integer
          example: 1
        state_id:
          type: integer
          example: 1

    LoginRequest:
      type: object
      required: [user, password]
      properties:
        user:
          type: string
          example: gcalderon.7
        password:
          type: string
          format: password
          example: tesxuc-futpAm-qitna3

    Participant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        surname:
          type: string
        email:
          type: string
        username:
          type: string

    Sport:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
        description:
          type: string
        url:
          type: string
        url_disabled:
          type: string

    Tournament:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
        description:
          type: string
        crest_url:
          type: string
        current_round:
          type: boolean
        current:
          type: boolean

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
        seed:
          type: integer
        streak_multiplier:
          type: integer
        play_in_team:
          type: boolean
        selected:
          type: boolean
        crest_url:
          type: string

    PortfolioTeam:
      type: object
      required: [id, seed, streak_multiplier]
      properties:
        id:
          type: integer
          example: 145
        seed:
          type: integer
          example: 1
        streak_multiplier:
          type: integer
          example: 1

    Portfolio:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        tournament_id:
          type: integer
        participant_id:
          type: integer
        championship_points:
          type: integer
        available:
          type: boolean
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PortfolioCreateRequest:
      type: object
      required: [tournament_id, participant_id, championship_points, teams]
      properties:
        tournament_id:
          type: integer
          example: 2
        participant_id:
          type: integer
          example: 134
        championship_points:
          type: integer
          example: 0
        teams:
          type: array
          minItems: 5
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PortfolioUpdateRequest:
      type: object
      required: [teams]
      properties:
        teams:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioTeam"

    PayOut:
      type: object
      properties:
        place:
          type: integer
        percentage:
          type: number
          format: float

    Instruction:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        highlighted:
          type: boolean

    Week:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        number:
          type: integer

    Wallet:
      type: object
      properties:
        id:
          type: integer
        balance:
          type: number
          format: float
        currency:
          type: string

    MostPickedTeam:
      type: object
      properties:
        team_name:
          type: string
        times_picked:
          type: integer
        percentage_portfolios:
          type: number
          format: float
        tournament_name:
          type: string
        year:
          type: integer

    TeamsNotPicked:
      type: object
      properties:
        team_name:
          type: string
        tournament_name:
          type: string
        year:
          type: integer

    TeamsPickedLog:
      type: object
      properties:
        team_name:
          type: string
        tournament_name:
          type: string
        year:
          type: integer
        times_picked:
          type: integer
        percentage_portfolios:
          type: number
          format: float
        round_eliminated:
          type: integer

    TeamsPerYearLog:
      type: object
      properties:
        year:
          type: integer
        teams:
          type: integer
        tournament_id:
          type: integer

    TeamPerfectPortfolios:
      type: object
      properties:
        year:
          type: integer
        tournament_id:
          type: integer
        total_weight:
          type: number
          format: float
        total_points:
          type: number
          format: float
        tournament_name:
          type: string
