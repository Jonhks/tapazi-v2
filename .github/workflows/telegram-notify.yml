name: Telegram Deploy Notification

on:
  push:
    branches:
      - qa
      - dev
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version and commit hash
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set environment label
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "label=🟢 PRODUCCIÓN" >> $GITHUB_OUTPUT
          elif [ "$BRANCH" = "qa" ]; then
            echo "label=🟡 QA" >> $GITHUB_OUTPUT
          else
            echo "label=🔵 DEV" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LABEL: ${{ steps.env.outputs.label }}
          VERSION: ${{ steps.meta.outputs.version }}
          HASH: ${{ steps.meta.outputs.hash }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          TEXT="${LABEL} — Nuevo deploy%0A%0A🏷 Versión: ${VERSION} (${HASH})%0A🌿 Rama: ${BRANCH}%0A👤 Por: ${ACTOR}%0A📝 ${COMMIT_MSG}%0A🔗 ${COMMIT_URL}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${TEXT}"
