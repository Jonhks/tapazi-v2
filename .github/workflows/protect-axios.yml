name: Protect Prod Axios

on:
  pull_request:
    branches:
      - main

jobs:
  protect-axios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4

      - name: Verify axios.ts uses hostname detection
        run: |
          if grep -q "window.location.hostname" src/lib/axios.ts && \
             grep -q "portfolio-pool-prod" src/lib/axios.ts && \
             grep -q "portfolio-pool-test" src/lib/axios.ts; then
            echo "✅ axios.ts tiene hostname detection correcta."
          else
            echo "❌ axios.ts no tiene el formato correcto de hostname detection."
            exit 1
          fi
