name: Protect Prod Axios

on:
  pull_request:
    branches:
      - main

jobs:
  protect-axios:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para que el bot empuje commits a la rama del PR
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Enforce Production axios.ts
        run: |
          # URL oficial de producción (hardcodeada para evitar dependencia circular con origin/main)
          PROD_URL="https://portfolio-pool-prod.damnserver.com:443"

          # Generamos el axios.ts correcto de producción
          cat > src/lib/axios.ts << 'AXIOS_EOF'
          import axios from "axios";

          const url = "PROD_URL_PLACEHOLDER";

          const apiEnv = axios.create({
            baseURL: url,
          });

          export { apiEnv };
          AXIOS_EOF

          # Limpiamos la indentación del heredoc y reemplazamos el placeholder
          sed -i 's/^          //' src/lib/axios.ts
          sed -i "s|PROD_URL_PLACEHOLDER|${PROD_URL}|" src/lib/axios.ts

          # Agregamos al staging
          git add src/lib/axios.ts

          # Revisamos si hubo diferencia
          if ! git diff --staged --quiet; then
            echo "⚠️ Detectado intento de alterar axios.ts hacia main."
            echo "🛡️ Restaurando automáticamente a la versión de producción..."
            git commit -m "chore(security): preservando axios.ts de producción [skip ci]"
            git push origin ${{ github.head_ref }}
          else
            echo "✅ axios.ts ya tiene la URL de producción correcta. Todo seguro."
          fi
